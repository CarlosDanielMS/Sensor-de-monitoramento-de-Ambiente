services:
  mongo:
    image: mongo:7
    container_name: mongo-monitoramento
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-monitoramento
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo

  backend:
    build:
      context: ./backend-monitoramento-gas
    container_name: backend-monitoramento-gas
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: monitoramento_ambiental
    volumes:
      - ./backend-monitoramento-gas:/app
      - /app/node_modules
    depends_on:
      - mongo

  mobile:
    build:
      context: ./app-monitoramento-gas
    container_name: app-monitoramento-gas
    restart: always
    ports:
      - "8082:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      EXPO_PUBLIC_API_URL: http://${LAN_IP}:3000
      REACT_NATIVE_PACKAGER_HOSTNAME: ${LAN_IP}
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
    volumes:
      - ./app-monitoramento-gas:/app
      - /app/node_modules
    command: npx expo start --lan --port 8081
    depends_on:
      - backend

  esp32-builder:
    image: platformio/platformio-core:latest
    container_name: esp32-monitoramento-builder
    working_dir: /workspace
    volumes:
      - ./esp32-monitoramento:/workspace
    command: platformio run
    profiles:
      - esp32

volumes:
  mongo_data: